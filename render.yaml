services:
  - type: web
    name: traditional-mongolian-gpt
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir web --bind 0.0.0.0:$PORT server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: LOG_LEVEL
        value: INFO
